services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: minigovern
      POSTGRES_PASSWORD: minigovern
      POSTGRES_DB: minigovern
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minigovern -d minigovern"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: